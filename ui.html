<section>
    <p>Select a text frame you've customized before clicking create to match its styles.</p>
    <p></p>
    <p>Space below labels: <input id="padding" value="20"> px</p>
</section>
<section>
    <button id="label" class="primaryButton">Create / Update Labels</button>
    <button id="lock" class="secondaryButton iconButton"> 🔒</button>
    <button id="hide" class="secondaryButton iconButton"> 👁</button>
    <button id="delete" class="secondaryButton iconButton"> 🗑</button>
    <button id="cancel" class="secondaryButton">Cancel</button>
</section>
<script>
    document.getElementById('label').onclick = () => {
        const textbox = document.getElementById('padding');
        const padding = parseInt(textbox.value);

        parent.postMessage({
            pluginMessage: {
                type: 'label-frames',
                padding
            }
        }, '*')
    }

    document.getElementById('delete').onclick = () => {
        parent.postMessage({
            pluginMessage: {
                type: 'delete'
            }
        }, '*')
    }

    document.getElementById('hide').onclick = () => {
        parent.postMessage({
            pluginMessage: {
                type: 'hide'
            }
        }, '*')
    }

    document.getElementById('lock').onclick = () => {
        parent.postMessage({
            pluginMessage: {
                type: 'lock'
            }
        }, '*')
    }

    document.getElementById('cancel').onclick = () => {
        parent.postMessage({
            pluginMessage: {
                type: 'cancel'
            }
        }, '*')
    }
</script>
